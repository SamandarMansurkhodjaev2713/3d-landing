  <!-- кромка кратера справа -->
  <circle cx="980" cy="300" r="210" fill="none" stroke="#67D5FF" stroke-width="2" opacity="0.35"/>
  <circle cx="1052" cy="372" r="22" fill="#FFCB57"/>
  <!-- координаты -->
  <g fill="#7B859F" font-size="22" letter-spacing="5">
