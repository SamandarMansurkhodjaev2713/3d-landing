      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#211d18"/>
      <stop offset="100%" stop-color="#0a0a0e" stop-opacity="0"/>
