name: Deploy to GitHub Pages

# Собирает Vite-проект и публикует dist/ на GitHub Pages при каждом пуше в main.
# Один раз включи Pages в репозитории: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Дальше деплой автоматический.

on:
  push:
    branches: [main]
  workflow_dispatch: # можно запускать деплой вручную из вкладки Actions

# Права, нужные официальным Pages-экшенам.
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — только один деплой; новый пуш отменяет незавершённый прогон.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
